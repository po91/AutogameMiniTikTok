<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pobierz Grę</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
    }
    .container {
      text-align: center;
      background: rgba(0, 0, 0, 0.6);
      padding: 50px 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 30px;
      font-size: 2.5em;
    }
    .download-button {
      padding: 15px 35px;
      font-size: 1.2em;
      color: #fff;
      background-color: #ff4b2b;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .download-button:hover {
      background-color: #ff416c;
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }
    p {
      margin-top: 20px;
      font-size: 1em;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pobierz swoją grę teraz!</h1>
    <a href="https://drive.google.com/file/d/1x7IqU4NSg9d4NbtgILMNdfPia1l22W7-/view" class="download-button">Pobierz grę</a>
    <p>Dobra gra w internecie czeka na Ciebie!</p>
  </div>
</body>
</html>
